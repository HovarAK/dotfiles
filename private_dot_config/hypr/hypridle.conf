#==============================================================#
#  hypridle.conf                                                 #
#  Idle / lock / dim / DPMS / suspend flow (Hyprland session)     #
#  https://wiki.hypr.land/Hypr-Ecosystem/hypridle/                #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  GENERAL  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
# Notes:
# - Use pidof guard to avoid stacking multiple hyprlock instances
# - Use loginctl lock-session for DE-agnostic session locking
# - after_sleep_cmd dpms on prevents "press twice to wake" behavior

general {
    lock_cmd = pidof hyprlock || hyprlock            # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session         # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on       # ensure displays wake cleanly after sleep
    # ignore_dbus_inhibit = false                    # optional: respect inhibitions (video calls, etc.)
}

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  BRIGHTNESS (OPTIONAL)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
# Requires: brightnessctl
# Keep these enabled only if you actually use brightnessctl for backlight.
# For desktops / external-only monitors, these may do nothing (safe but noisy).

listener {
    timeout = 150                                     # 2.5 min
    on-timeout = brightnessctl -s set 10              # dim screen (avoid 0 on OLED)
    on-resume  = brightnessctl -r                     # restore brightness
}

# Optional: keyboard backlight (only if your device exposes rgb:kbd_backlight)
# listener {
#     timeout = 150
#     on-timeout = brightnessctl -sd rgb:kbd_backlight set 0  # keyboard backlight off
#     on-resume  = brightnessctl -rd rgb:kbd_backlight        # keyboard backlight on
# }

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  LOCK  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

listener {
    timeout = 300                                     # 5 min
    on-timeout = loginctl lock-session                # lock session (triggers hypridle lock_cmd)
}

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  DISPLAY POWER (DPMS)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

listener {
    timeout = 330                                     # 5.5 min (shortly after lock)
    on-timeout = hyprctl dispatch dpms off            # screen off
    on-resume  = hyprctl dispatch dpms on && brightnessctl -r # screen on + restore brightness (if using brightnessctl)
}

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  SUSPEND  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

listener {
    timeout = 1800                                    # 30 min
    on-timeout = systemctl suspend                    # suspend machine
}
