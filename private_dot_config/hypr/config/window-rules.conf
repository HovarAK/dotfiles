#==============================================================#
#  Hyprland :: windows-workspaces.conf                          #
#  Window rules + layer rules + workspace behavior              #
#  https://wiki.hypr.land/Configuring/Window-Rules/             #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  GLOBAL SANITY FIXES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

windowrule = suppressevent maximize, class:.*                                      # ignore maximize requests (prevents weird tiling behavior)
windowrule = nofocus, class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0 # fix XWayland drag focus glitches

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  LAUNCHERS / OVERLAYS (LAYER SURFACES)  \\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Launcher (fuzzel uses layer-shell too; namespace can vary by build)
# Verified via `hyprctl layers` (keep wofi rules if you still use it)
layerrule = dimaround, wofi
# layerrule = blur, wofi

# If you want the same effect for fuzzel, uncomment after verifying namespace via `hyprctl layers`
# layerrule = dimaround, fuzzel
# layerrule = blur, fuzzel

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  NOTIFICATIONS (SWAYNC) (LAYER SURFACES)  \\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

layerrule = dimaround, swaync-control-center
# layerrule = blur, swaync-control-center

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  DIALOGS / FILE PICKERS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

windowrulev2 = float,  title:^(Open File|Save File|Save As|Choose Files|Select a File)$
windowrulev2 = center, title:^(Open File|Save File|Save As|Choose Files|Select a File)$

windowrulev2 = float,  title:^(Authentication Required)$
windowrulev2 = center, title:^(Authentication Required)$

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  PICTURE-IN-PICTURE  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$
windowrulev2 = size 640 360, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-660 60, title:^(Picture-in-Picture)$

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  WORKSPACE ASSIGNMENTS (SSOT)                            #
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# WS1: Main (Zen Browser)
windowrulev2 = workspace 1 silent, class:^(app\.zen_browser\.zen)$

# WS2: Work (Obsidian)
windowrulev2 = workspace 2 silent, class:^(md\.obsidian\.Obsidian|obsidian)$

# WS4: Social (Discord)
windowrulev2 = workspace 4 silent, class:^(com\.discordapp\.Discord)$

# WS5: Gaming (Steam)
windowrulev2 = workspace 5 silent, class:^(steam)$

# WS3: Dev (kitty terminals that you use for coding)
# NOTE: Neovim runs inside kitty, so we match on class=kitty + window title.
# Best practice: launch dev terminals with a fixed title ("dev", "nvim", "docker") for reliable routing.
windowrulev2 = workspace 3 silent, class:^(kitty)$, title:^(dev|nvim|NVIM|code|Code)$
windowrulev2 = workspace 3 silent, class:^(kitty)$, title:^(docker|compose|logs)$

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  SPECIAL WORKSPACE: SCRATCHPAD ("magic")                #
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Scratch terminals/tools (toggle with $mainMod+Space as you already do)
windowrulev2 = workspace special:magic silent, class:^(kitty)$, title:^(scratch|nnn|htop|btop)$
