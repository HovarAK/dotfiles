#==============================================================#
#  Hyprland :: monitors.conf                                    #
#  Monitor layout + modes                                       #
#  https://wiki.hypr.land/Configuring/Monitors/                 #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  PRIMARY DISPLAY  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

monitor = DP-2,1920x1080@100,0x0,1    # Samsung LS24D40xG: 1080p @ 100Hz, position (0,0), scale 1.0

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  FALLBACK DEFAULT  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

monitor = ,preferred,auto,auto        # any other monitor -> preferred mode, auto position, auto scale

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  NOTES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Verify monitor names + modes:
#   hyprctl monitors
#
# If DP-2 isn't present sometimes (dock/hotplug), you can add additional explicit lines:
#   monitor = HDMI-A-1,preferred,auto,1
