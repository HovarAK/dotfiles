#==============================================================#
#  Hyprland :: variables.conf                                   #
#  Single source of truth for app commands + binds + session     #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  CORE LAUNCHERS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$terminal         = kitty                            # terminal emulator
$launcher         = fuzzel --prompt "Apps: "           # app launcher
$menu             = $launcher                        # legacy alias
$term             = $terminal                        # legacy alias

$editor           = kitty -e nvim                    # quick editor (nvim in terminal)
$browser          = flatpak run app.zen_browser.zen  # browser (Zen)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  FILE MANAGEMENT  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$fm_tui           = kitty -e nnn                     # TUI file manager (nnn)
$fm_gui           = thunar                           # GUI file manager (Thunar)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  DEV / TOOLING  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Neovim in a titled kitty window (routes to ws3 via windowrulev2)
$dev_nvim         = nv .

# Container helper terminal (Podman-first; safe if not installed)
$dev_docker       = bash -lc '\
  if command -v podman-compose >/dev/null 2>&1; then \
    exec kitty --title docker -e sh -lc "podman-compose logs -f; exec sh"; \
  elif command -v podman >/dev/null 2>&1; then \
    exec kitty --title docker -e sh -lc "podman ps; echo; echo \"Tip: podman logs -f <container>\"; exec sh"; \
  else \
    exec kitty --title docker -e sh -lc "echo \"Install podman (and optionally podman-compose/toolbox).\"; exec sh"; \
  fi'

# Scratch: nnn in a titled kitty window (routes to special:magic via windowrulev2)
$scratch_nnn      = kitty --title nnn -e nnn

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  SESSION / SECURITY  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$lock             = hyprlock                         # lock screen
$idle             = hypridle                         # idle daemon (DPMS / lock timers)

# Optional VPN GUI (layered RPM)
$vpn              = bash -lc 'setsid -f "/opt/Mullvad VPN/mullvad-vpn" >/dev/null 2>&1'

# Tailscale systray (UI only; tailscaled should be started via systemd)
$tailscale_tray   = bash -lc 'command -v tailscale >/dev/null 2>&1 && setsid -f tailscale systray >/dev/null 2>&1'

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  APPS (FLATPAKS)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$discord          = flatpak run com.discordapp.Discord       # Discord
$steam            = flatpak run com.valvesoftware.Steam      # Steam
$notes            = flatpak run md.obsidian.Obsidian         # Obsidian
$browser_private  = flatpak run net.mullvad.MullvadBrowser   # Mullvad Browser (alt)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  NOTIFICATIONS (SWAYNC)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$notifd           = swaync                           # notification daemon
$notif_toggle     = swaync-client -t                 # toggle notification panel
$notif_dnd        = swaync-client -d                 # toggle do-not-disturb

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  UTILITIES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$screenshot_region = hyprshot -m region              # region screenshot
$screenshot_output = hyprshot -m output              # output screenshot

$copy             = wl-copy                          # pipe into clipboard
$paste            = wl-paste                         # paste from clipboard

$bar              = waybar                           # status bar

# Bluetooth (Blueman)
$bluetooth_mgr    = blueman-manager
$bluetooth_applet = blueman-applet

# $picker         = hyprpicker                       # color picker (optional)
# $powermenu      = wlogout                          # power menu (optional)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  AUTOSTART COMMANDS (SSOT)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

$svc_env          = dbus-update-activation-environment --systemd --all
$svc_wallpaper    = hyprpaper
$svc_notify       = $notifd
$svc_idle         = $idle
$svc_network      = nm-applet --indicator
$svc_bluetooth    = $bluetooth_applet

$svc_polkit       = /usr/libexec/hyprpolkitagent
# $svc_polkit     = /usr/libexec/polkit-gnome-authentication-agent-1

$svc_bar          = $bar
$svc_vpn          = $vpn
$svc_tailscale    = $tailscale_tray

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  KEYBIND KEYS (SSOT)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Apps
$kb_terminal      = Q
$kb_menu          = R            # mainMod+R opens menu
$kb_reload        = R            # mainMod+Shift+R reloads Hyprland (same key, shifted)
$kb_help          = H            # display keyboard cheatsheet
$kb_browser       = B
$kb_editor        = T
$kb_notes         = N
$kb_discord       = D
$kb_steam         = G
$kb_vpn           = V
$kb_lock          = L

# File managers
$kb_fm_tui        = E
$kb_fm_gui        = E            # SHIFT+E

# Window / layout actions
$kb_close         = C
$kb_float         = V
$kb_fullscreen    = F
$kb_exit          = M            # SHIFT+M
$kb_pseudo        = P
$kb_split         = J
$kb_scratch       = Space
$kb_waybar        = W

# Notifications
$kb_notif         = Y

# Screenshots
$kb_shot_region   = S
$kb_print         = Print

# Focus / movement (arrows)
$kb_focus_left    = left
$kb_focus_right   = right
$kb_focus_up      = up
$kb_focus_down    = down

# Workspaces
$kb_ws_1          = 1
$kb_ws_2          = 2
$kb_ws_3          = 3
$kb_ws_4          = 4
$kb_ws_5          = 5
$kb_ws_6          = 6
$kb_ws_7          = 7
$kb_ws_8          = 8
$kb_ws_9          = 9
$kb_ws_10         = 0            # maps to workspace 10

$kb_ws_next       = mouse_down
$kb_ws_prev       = mouse_up

# Mouse (Hyprland button codes)
$kb_mouse_move    = mouse:272
$kb_mouse_resize  = mouse:273
