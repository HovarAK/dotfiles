#==============================================================#
#  Hyprland :: keybindings.conf                                 #
#  https://wiki.hypr.land/Configuring/Binds/                     #
#==============================================================#

# NOTE:
# - Keys are defined in variables.conf as $kb_*
# - Commands are defined in variables.conf as $terminal/$menu/etc
# - Ensure variables.conf is sourced BEFORE this file in hyprland.conf

$mainMod = SUPER                                  # main modifier (Windows key)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  APPS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_terminal, exec, $terminal               # terminal
bind = $mainMod, $kb_menu,     exec, $menu                   # menu (dofi/wofi/etc via SSOT)
bind = $mainMod, $kb_help, exec, ~/.config/hypr/scripts/show-cheatsheet.sh
bind = $mainMod SHIFT, $kb_reload, exec, hyprctl reload      # reload Hyprland

bind = $mainMod, $kb_browser,  exec, $browser                # browser (Zen)
bind = $mainMod SHIFT, $kb_browser, exec, $browser_private   # private browser (Mullvad)

bind = $mainMod, $kb_editor,   exec, $editor                 # editor (nvim in kitty)
bind = $mainMod, $kb_notes,    exec, $notes                  # notes (Obsidian)
bind = $mainMod, $kb_discord,  exec, $discord                # Discord
bind = $mainMod, $kb_steam,    exec, $steam                  # Steam

bind = $mainMod SHIFT, $kb_vpn, exec, $vpn                   # VPN GUI (Mullvad)
bind = $mainMod, $kb_lock,     exec, $lock                   # lock (hyprlock)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  FILE MANAGERS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_fm_tui, exec, $fm_tui                   # TUI file manager (nnn)
bind = $mainMod SHIFT, $kb_fm_gui, exec, $fm_gui             # GUI file manager (Thunar)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  FUNCTIONS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_close,       killactive,                # close active window
bind = $mainMod, $kb_float,       togglefloating,            # toggle floating
bind = $mainMod, $kb_fullscreen,  fullscreen,                # toggle fullscreen
bind = $mainMod SHIFT, $kb_exit,  exit,                      # exit Hyprland (hard quit)

bind = $mainMod, $kb_pseudo,      pseudo,                    # dwindle pseudo-tile
bind = $mainMod, $kb_split,       togglesplit,               # dwindle split toggle

bind = $mainMod, $kb_scratch,     togglespecialworkspace, magic         # scratchpad toggle
bind = $mainMod SHIFT, $kb_scratch, movetoworkspace, special:magic      # send window to scratchpad

bind = $mainMod, $kb_waybar, exec, pkill waybar || waybar    # toggle waybar

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  NOTIFICATIONS (SWAYNC)  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_notif,       exec, $notif_toggle        # toggle notification panel
bind = $mainMod SHIFT, $kb_notif, exec, $notif_dnd           # toggle do-not-disturb

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  SCREENSHOTS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_shot_region, exec, $screenshot_region   # region screenshot (hyprshot)
bind = ,        $kb_print,        exec, $screenshot_region   # region screenshot (Print)
bind = $mainMod, $kb_print,       exec, $screenshot_output   # output screenshot (hyprshot)

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  FOCUS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_focus_left,  movefocus, l               # focus left
bind = $mainMod, $kb_focus_right, movefocus, r               # focus right
bind = $mainMod, $kb_focus_up,    movefocus, u               # focus up
bind = $mainMod, $kb_focus_down,  movefocus, d               # focus down

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  MOVE WINDOW  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod SHIFT, $kb_focus_left,  movewindow, l        # move window left
bind = $mainMod SHIFT, $kb_focus_right, movewindow, r        # move window right
bind = $mainMod SHIFT, $kb_focus_up,    movewindow, u        # move window up
bind = $mainMod SHIFT, $kb_focus_down,  movewindow, d        # move window down

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  WORKSPACES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod, $kb_ws_1, workspace, 1
bind = $mainMod, $kb_ws_2, workspace, 2
bind = $mainMod, $kb_ws_3, workspace, 3
bind = $mainMod, $kb_ws_4, workspace, 4
bind = $mainMod, $kb_ws_5, workspace, 5
bind = $mainMod, $kb_ws_6, workspace, 6
bind = $mainMod, $kb_ws_7, workspace, 7
bind = $mainMod, $kb_ws_8, workspace, 8
bind = $mainMod, $kb_ws_9, workspace, 9
bind = $mainMod, $kb_ws_10, workspace, 10

bind = $mainMod, $kb_ws_next, workspace, e+1
bind = $mainMod, $kb_ws_prev, workspace, e-1


#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  MOVE TO WORKSPACE  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bind = $mainMod SHIFT, $kb_ws_1,  movetoworkspace, 1
bind = $mainMod SHIFT, $kb_ws_2,  movetoworkspace, 2
bind = $mainMod SHIFT, $kb_ws_3,  movetoworkspace, 3
bind = $mainMod SHIFT, $kb_ws_4,  movetoworkspace, 4
bind = $mainMod SHIFT, $kb_ws_5,  movetoworkspace, 5
bind = $mainMod SHIFT, $kb_ws_6,  movetoworkspace, 6
bind = $mainMod SHIFT, $kb_ws_7,  movetoworkspace, 7
bind = $mainMod SHIFT, $kb_ws_8,  movetoworkspace, 8
bind = $mainMod SHIFT, $kb_ws_9,  movetoworkspace, 9
bind = $mainMod SHIFT, $kb_ws_10, movetoworkspace, 10


#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  SPAWN PATTERN (CTRL+SHIFT / ALT+SHIFT)  \\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# WS1 Main
bind = CTRL SHIFT, $kb_ws_1, exec, hyprctl dispatch workspace 1 && $browser
bind = ALT  SHIFT, $kb_ws_1, exec, hyprctl dispatch workspace 1 && $menu

# WS2 Work
bind = CTRL SHIFT, $kb_ws_2, exec, hyprctl dispatch workspace 2 && $notes
bind = ALT  SHIFT, $kb_ws_2, exec, hyprctl dispatch workspace 2 && $browser

# WS3 Dev
bind = CTRL SHIFT, $kb_ws_3, exec, hyprctl dispatch workspace 3 && $dev_nvim
bind = ALT  SHIFT, $kb_ws_3, exec, hyprctl dispatch workspace 3 && $dev_docker

# WS4 Social
bind = CTRL SHIFT, $kb_ws_4, exec, hyprctl dispatch workspace 4 && $discord
# optional secondary: open browser_private or notes; leaving unbound for now

# WS5 Gaming
bind = CTRL SHIFT, $kb_ws_5, exec, hyprctl dispatch workspace 5 && $steam
# optional secondary: discord overlay, etc; leaving unbound for now
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  MOUSE  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bindm = $mainMod, $kb_mouse_move,   movewindow              # drag to move
bindm = $mainMod, $kb_mouse_resize, resizewindow            # drag to resize

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  MEDIA / SYSTEM KEYS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+       # volume up
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume      @DEFAULT_AUDIO_SINK@ 5%-       # volume down
bindel = ,XF86AudioMute,        exec, wpctl set-mute        @DEFAULT_AUDIO_SINK@ toggle    # mute
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute        @DEFAULT_AUDIO_SOURCE@ toggle # mic mute

bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+                       # brightness up
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-                       # brightness down

bindl  = ,XF86AudioNext,  exec, playerctl next                                             # next
bindl  = ,XF86AudioPrev,  exec, playerctl previous                                         # prev
bindl  = ,XF86AudioPlay,  exec, playerctl play-pause                                       # play/pause
bindl  = ,XF86AudioPause, exec, playerctl play-pause                                       # play/pause
