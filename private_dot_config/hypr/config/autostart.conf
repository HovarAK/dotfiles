#==============================================================#
#  Hyprland :: autostart.conf                                   #
#  Start essential session services (clean + modular)            #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  SESSION ENVIRONMENT (NO UWSM)  \\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
# Purpose:
# - Expose Hyprland env vars to systemd --user services
# - Prevent xdg-desktop-portal / flatpak weirdness without UWSM
# Wiki:
#   https://wiki.hypr.land/Configuring/Environment-variables/

exec-once = $svc_env                       # dbus + systemd env export

# Optional safety net:
# Restart portals only if you see broken file pickers or flatpak issues
# exec-once = systemctl --user restart xdg-desktop-portal xdg-desktop-portal-hyprland

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  CORE SESSION SERVICES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
# Wiki:
#   https://wiki.hypr.land/Useful-Utilities/Must-have/

# Authentication prompts (sudo, mounts, VPN, etc.)
exec-once = $svc_polkit                    # polkit agent (GUI auth)

# Notifications (required to avoid app freezes; swaync chosen)
exec-once = $svc_notify                    # swaync notification daemon

# Wi-Fi Gui daemon
exec-once = $svc_network

# Bluetooth Gui daemon
exec-once = $svc_bluetooth

# Waybar
exec-once = $svc_bar

# Wallpaper handling (kept separate from aesthetics.conf)
exec-once = $svc_wallpaper                 # hyprpaper

# Idle → lock flow
# hypridle triggers hyprlock via its own config
exec-once = $svc_idle                      # idle/lock manager

# clipboard / temp
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  OPTIONAL: USER APP AUTOSTART  \\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
# Keep these commented by default to preserve fast, clean logins.
# Enable only if you *always* want them at session start.

# exec-once = $vpn                         # Mullvad VPN GUI
# exec-once = $discord                     # Discord
# exec-once = $svc_tailscale               # Tailscale systray
exec-once = $notes                       # Obsidian
exec-once = $browser                     # Zen Browser
