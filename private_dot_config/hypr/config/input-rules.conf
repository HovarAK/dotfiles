#==============================================================#
#  Hyprland :: input.conf                                       #
#  Keyboard / mouse / touchpad + gestures + per-device overrides #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  KEYBOARD / POINTER DEFAULTS  \\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

input {
    kb_layout     = us        # keyboard layout
    # kb_variant  = intl      # optional (example)
    # kb_model    =           # optional
    # kb_options  =           # optional (example: grp:alt_shift_toggle)
    # kb_rules    =           # optional

    follow_mouse  = 1         # focus follows cursor (0-3)
    sensitivity   = 0.0       # pointer speed/accel modifier (-1.0 .. 1.0)

    # accel_profile = flat    # optional: adaptive | flat | custom

    touchpad {
        natural_scroll = false # natural scrolling direction
        # disable_while_typing = true  # optional (often desirable)
        # scroll_factor = 1.0          # optional: touchpad scroll multiplier
        # tap-to-click = true          # optional (default true)
        # tap-and-drag = true          # optional (default true)
        # clickfinger_behavior = false # optional: multi-finger click mapping
    }
}

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  GESTURES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

gesture = 3, horizontal, workspace  # 3-finger horizontal swipe -> switch workspaces :contentReference[oaicite:1]{index=1}

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  PER-DEVICE OVERRIDES  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Tip: get exact device names with: hyprctl devices :contentReference[oaicite:2]{index=2}
device {
    name = epic-mouse-v1
    sensitivity = -0.5        # slower for this specific mouse
}
