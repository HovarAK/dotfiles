#==============================================================#
#  Hyprland :: environment.conf                                 #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  XDG SESSION BASICS (NO UWSM)  \\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

env = XDG_CURRENT_DESKTOP,Hyprland      # portals/app detection
env = XDG_SESSION_TYPE,wayland          # explicit Wayland session
env = XDG_SESSION_DESKTOP,Hyprland      # portals/app detection

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  TOOLKIT BACKENDS (SAFE DEFAULTS)  \\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

env = GDK_BACKEND,wayland,x11,*         # GTK: prefer Wayland, fall back to X11
env = QT_QPA_PLATFORM,wayland;xcb       # Qt: prefer Wayland, fall back to X11
env = SDL_VIDEODRIVER,wayland           # SDL2: prefer Wayland (remove if a game misbehaves)
env = CLUTTER_BACKEND,wayland           # Clutter: force Wayland backend

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  NVIDIA (OPEN) + WAYLAND  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

env = __GLX_VENDOR_LIBRARY_NAME,nvidia  # ensure GLX picks NVIDIA
env = LIBVA_DRIVER_NAME,nvidia          # NVIDIA VA-API selection (set only if you intend to use it)

# Optional: only if you specifically need to force GBM backend
# env = GBM_BACKEND,nvidia-drm          # try only if you hit rendering issues

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  ELECTRON / CEF WAYLAND HINT  \\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

env = ELECTRON_OZONE_PLATFORM_HINT,auto # helps many Electron/CEF apps use Wayland

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  THEMING (Nwg-look OWNS THIS)  \\\\\\\\\\\\\\\\\\\\\\\\\\\
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

# Intentionally NOT setting: GTK_THEME / XCURSOR_THEME / XCURSOR_SIZE
# Use nwg-look to manage GTK theme, icons, cursor and sizes instead.
