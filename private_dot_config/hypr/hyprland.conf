#
#                M A I N   C O N F I G
#
# Entry point for all Hyprland configuration.
# This file only sources modular config files to keep
# things clean, readable, and easy to maintain.
#
# Docs → https://wiki.hypr.land/Configuring/
############################################################

# ─── Display & layout ─────────────────────────────────────
source = $HOME/.config/hypr/config/monitors.conf      # Monitor setup: resolution, refresh rate, positioning

# ─── Core variables ───────────────────────────────────────
source = $HOME/.config/hypr/config/variables.conf     # Global variables (terminal, file manager, mod key)

# ─── Startup behavior ────────────────────────────────────
source = $HOME/.config/hypr/config/autostart.conf     # Applications and services started on launch

# ─── Environment ─────────────────────────────────────────
source = $HOME/.config/hypr/config/environment.conf    # Wayland, XDG, GPU, and toolkit environment variables

# ─── Permissions & portals ───────────────────────────────
source = $HOME/.config/hypr/config/permissions.conf   # Security rules, portals, screen sharing access

# ─── Look & feel ─────────────────────────────────────────
source = $HOME/.config/hypr/config/aesthetics.conf    # Gaps, borders, animations, blur, colors

# ─── Input devices ───────────────────────────────────────
source = $HOME/.config/hypr/config/input-rules.conf   # Keyboard, mouse, touchpad configuration

# ─── Keybindings ─────────────────────────────────────────
source = $HOME/.config/hypr/config/keybindings.conf   # All keyboard shortcuts and actions

# ─── Window behavior ─────────────────────────────────────
source = $HOME/.config/hypr/config/window-rules.conf  # Floating rules, workspace rules, app-specific behavior
