#==============================================================#
#  hyprpaper.conf                                               #
#  Wallpaper daemon config (legacy syntax; matches your build)   #
#  https://wiki.hypr.land/Hypr-Ecosystem/hyprpaper/              #
#==============================================================#

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  OPTIONS  \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

ipc = on                                           # enable hyprctl IPC
splash = false                                     # disable Hyprland splash overlay

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  PRELOAD (REQUIRED FOR IPC WALLPAPER SET)  \\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

preload = ~/.config/hypr/wallpapers/main.jpg        # main wallpaper (DP-2)
preload = ~/.config/hypr/wallpapers/fallback.png    # fallback wallpaper

#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#
#//////  APPLY PER MONITOR + FALLBACK  \\\\\\\\\\\\\\\\\\\\\\\\\#
#\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\#

wallpaper = DP-2,~/.config/hypr/wallpapers/main.jpg # DP-2 wallpaper
wallpaper = ,~/.config/hypr/wallpapers/fallback.png # fallback for any other monitor
