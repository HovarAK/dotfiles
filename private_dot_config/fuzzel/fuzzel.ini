# ~/.config/fuzzel/fuzzel.ini
# Modern launcher theme + frecency-friendly defaults

[main]
prompt="Apps"
font=JetBrainsMono Nerd Font:size=13
icon-theme=Papirus

lines=11
width=46

horizontal-pad=22
vertical-pad=15
inner-pad=12
line-height=28

border-width=2
corner-radius=18

fuzzy=yes
show-actions=no
exit-on-keyboard-focus-loss=yes

# If you use multiple monitors and want it centered:
# anchor=center

[colors]
# background and text
background=12141AEE
text=EBF0FFEB
prompt=EBF0FFAA
placeholder=EBF0FF80
input=EBF0FFEB

# match / selection styling
match=7AA2F7FF
selection=FFFFFF14
selection-text=FFFFFFFF

# border colors
border=FFFFFF1A

# optional “accent” feel for counters / headers
counter=FF6B81CC

